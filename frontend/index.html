<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>GLM Chat</title>
<link rel="stylesheet" href="style.css" />
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github.min.css" />
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/core.min.js"></script>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <button id="newChatBtn" class="new-chat-btn">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
        Nova conversa
      </button>
      <div id="chatList" class="chat-list"></div>
      <div class="sidebar-footer">
        <span class="model-tag">z-ai/glm-5.2</span>
      </div>
    </aside>

    <main class="main">
      <div id="messages" class="messages">
        <div class="empty-state" id="emptyState">
          <h1>Como posso ajudar?</h1>
        </div>
      </div>

      <form id="composer" class="composer">
        <div class="composer-inner">
          <textarea
            id="input"
            rows="1"
            placeholder="Envie uma mensagem para o GLM 5.2..."
          ></textarea>
          <button type="submit" id="sendBtn" class="send-btn" disabled>
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
          </button>
        </div>
        <p class="disclaimer">O GLM 5.2 pode cometer erros. Verifique informações importantes.</p>
      </form>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
